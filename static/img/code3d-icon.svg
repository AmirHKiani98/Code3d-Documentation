<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#111118"/>
    </linearGradient>

    <!-- Neon cyan glow -->
    <filter id="neonCyan" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur1"/>
      <feGaussianBlur stdDeviation="5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Neon magenta glow -->
    <filter id="neonMagenta" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur1"/>
      <feGaussianBlur stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft overall glow -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cube face gradient -->
    <linearGradient id="topFace" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffe7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00ffe7;stop-opacity:0.35"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffe7;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00ffe7;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffe7;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#00ffe7;stop-opacity:0.02"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="200" height="200" rx="28" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines for depth -->
  <line x1="0" y1="100" x2="200" y2="100" stroke="#00ffe7" stroke-width="0.2" stroke-opacity="0.08"/>
  <line x1="100" y1="0" x2="100" y2="200" stroke="#00ffe7" stroke-width="0.2" stroke-opacity="0.08"/>

  <!-- 3D Isometric Cube centered at ~(100, 72) -->
  <!-- Top face -->
  <polygon points="100,42 138,62 100,82 62,62" fill="url(#topFace)" stroke="#00ffe7" stroke-width="1.2" filter="url(#neonCyan)"/>
  <!-- Left face -->
  <polygon points="62,62 100,82 100,116 62,96" fill="url(#leftFace)" stroke="#00ffe7" stroke-width="1.2" filter="url(#softGlow)"/>
  <!-- Right face -->
  <polygon points="100,82 138,62 138,96 100,116" fill="url(#rightFace)" stroke="#00ffe7" stroke-width="1.2" filter="url(#softGlow)"/>

  <!-- Neon edge highlights -->
  <!-- Top edges -->
  <line x1="100" y1="42" x2="138" y2="62" stroke="#00ffe7" stroke-width="1.8" filter="url(#neonCyan)" stroke-opacity="0.9"/>
  <line x1="100" y1="42" x2="62" y2="62" stroke="#00ffe7" stroke-width="1.8" filter="url(#neonCyan)" stroke-opacity="0.9"/>
  <!-- Vertical edges -->
  <line x1="100" y1="82" x2="100" y2="116" stroke="#ff2d78" stroke-width="1.5" filter="url(#neonMagenta)" stroke-opacity="0.9"/>
  <line x1="62" y1="62" x2="62" y2="96" stroke="#00ffe7" stroke-width="1.2" filter="url(#neonCyan)" stroke-opacity="0.6"/>
  <line x1="138" y1="62" x2="138" y2="96" stroke="#00ffe7" stroke-width="1.2" filter="url(#neonCyan)" stroke-opacity="0.6"/>
  <!-- Bottom edges -->
  <line x1="62" y1="96" x2="100" y2="116" stroke="#00ffe7" stroke-width="1.2" filter="url(#neonCyan)" stroke-opacity="0.5"/>
  <line x1="138" y1="96" x2="100" y2="116" stroke="#00ffe7" stroke-width="1.2" filter="url(#neonCyan)" stroke-opacity="0.5"/>

  <!-- Corner dot accent (top) -->
  <circle cx="100" cy="42" r="2.5" fill="#00ffe7" filter="url(#neonCyan)"/>
  <!-- Corner dot magenta (bottom center) -->
  <circle cx="100" cy="116" r="2" fill="#ff2d78" filter="url(#neonMagenta)"/>

  <!-- Brand name: Code3D -->
  <!-- "Code" in white -->
  <text x="100" y="152" font-family="'Courier New', 'Courier', monospace" font-size="19" font-weight="700" fill="#e8e8f0" text-anchor="middle" letter-spacing="1" filter="url(#softGlow)">Code</text>
  <!-- "3D" in neon cyan -->
  <text x="135" y="152" font-family="'Courier New', 'Courier', monospace" font-size="19" font-weight="700" fill="#00ffe7" text-anchor="middle" letter-spacing="1" filter="url(#neonCyan)">3D</text>

  <!-- Thin separator line under text -->
  <line x1="60" y1="160" x2="140" y2="160" stroke="#00ffe7" stroke-width="0.6" stroke-opacity="0.35"/>

  <!-- Subtle tagline dots -->
  <circle cx="86" cy="172" r="1.2" fill="#ff2d78" opacity="0.7"/>
  <circle cx="100" cy="172" r="1.2" fill="#00ffe7" opacity="0.7"/>
  <circle cx="114" cy="172" r="1.2" fill="#ff2d78" opacity="0.7"/>
</svg>
